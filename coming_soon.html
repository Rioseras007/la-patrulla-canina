<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRÓXIMAMENTE | EDICIÓN FÍSICA</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&family=Bebas+Neue&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        :root {
            --primary: #854CE6;
            --secondary: #00F2FF;
            --gold: #FFD700;
            --bg-dark: #050709;
            --glass-bg: rgba(15, 18, 25, 0.95);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #FFFFFF;
            --text-muted: #70757a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(at 0% 0%, rgba(133, 76, 230, 0.3) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 255, 0.2) 0px, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .container {
            max-width: 800px;
            background: var(--glass-bg);
            padding: 4rem 2rem;
            border-radius: 40px;
            border: 1px solid var(--gold);
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.2);
            position: relative;
            overflow: hidden;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-20px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        h1 {
            font-family: 'Bebas Neue';
            font-size: clamp(3rem, 5vw, 5rem);
            color: var(--gold);
            margin-bottom: 2rem;
            text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
            line-height: 1;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .highlight {
            color: var(--text-main);
            font-weight: 700;
        }

        .logos {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .logo-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 1px;
            border: 1px solid var(--glass-border);
            text-transform: uppercase;
        }

        .btn-back {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white;
            padding: 1rem 3rem;
            border: none;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1.2rem;
            cursor: pointer;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 10px 30px rgba(133, 76, 230, 0.3);
        }

        .btn-back:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 50px rgba(0, 242, 255, 0.4);
        }

        .icon-warning {
            font-size: 4rem;
            color: var(--secondary);
            margin-bottom: 1rem;
            display: block;
        }
    </style>
</head>

<body>

    <div class="container">
        <i class="fas fa-compact-disc icon-warning"></i>
        <h1>PRÓXIMAMENTE</h1>
        <p>
            Disculpa las molestias.<br>
            El <span class="highlight">FORMATO FÍSICO</span> (Edición Coleccionista CD + DVD)<br>
            estará disponible muy pronto en las principales plataformas de venta.
        </p>

        <div class="logos">
            <div class="logo-box">Amazon</div>
            <div class="logo-box">Fnac</div>
            <div class="logo-box">El Corte Inglés</div>
            <div class="logo-box">Game</div>
        </div>

        <a href="javascript:history.back()" class="btn-back">VOLVER A LA MISIÓN</a>
    </div>

</body>

</html>
